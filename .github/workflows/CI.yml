name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            pixi-command: |
              pixi run -e linux test_linux
              pixi run -e wasm test_wasm
              pixi run -e upstream test_cross
              pixi run -e upstream validate_refs
              pixi run -e upstream test_tinyc_upstream
              TINYC_LOWERING=native pixi run -e upstream test_tinyc_upstream
              pixi run -e upstream test_tinyc_upstream_wasm
              pixi run -e upstream test_tinyc_native
              pixi run -e linux test_linux_tinyc
          - platform: macos
            os: macos-latest
            pixi-command: |
              pixi run -e macos test_macos
              pixi run -e wasm test_wasm
              pixi run -e upstream test_cross
              pixi run -e upstream validate_refs
              pixi run -e upstream test_tinyc_upstream
              TINYC_LOWERING=native pixi run -e upstream test_tinyc_upstream
              pixi run -e upstream test_tinyc_upstream_wasm
              pixi run -e upstream test_tinyc_native
              pixi run -e macos test_macos_tinyc
          - platform: windows
            os: windows-latest
            pixi-command: |
              call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" || exit /b 1
              pixi run -e windows test_windows || exit /b 1
              pixi run -e wasm test_wasm || exit /b 1
              pixi run -e upstream test_cross || exit /b 1
              pixi run -e upstream validate_refs || exit /b 1
              pixi run -e upstream test_tinyc_upstream || exit /b 1
              cmd /c "set TINYC_LOWERING=native&& pixi run -e upstream test_tinyc_upstream" || exit /b 1
              pixi run -e upstream test_tinyc_upstream_wasm || exit /b 1
              pixi run -e upstream test_tinyc_native || exit /b 1

    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          cache: true

      - name: Build and test ${{ matrix.platform }}
        if: matrix.platform != 'windows'
        run: ${{ matrix.pixi-command }}

      - name: Build and test ${{ matrix.platform }}
        if: matrix.platform == 'windows'
        run: ${{ matrix.pixi-command }}
        shell: cmd

      - name: Upload test outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs-${{ matrix.platform }}
          path: tests/output/
          if-no-files-found: ignore
