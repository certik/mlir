# ---------------------------------------------------------------------------
# libc interop: tinyC programs that declare libc functions via `extern`
# and link against the system libc through the test harness's $CC. These
# tests prove that the language can be used end-to-end against the real
# libc surface, not just runtime.c. FILE* is modeled as `void *` (Option
# A in PR #120) — tinyC has no need for the layout of FILE.
# ---------------------------------------------------------------------------

[[test]]
name = "libc_strcmp"
expected_stdout = "0\n-1\n1\n"

[[test]]
name = "libc_memcmp"
expected_stdout = "0\n-1\n1\n"

