[workspace]
authors = ["Ondřej Čertík <ondrej@certik.us>"]
channels = [
    "https://prefix.dev/certik-forge",
    "conda-forge",
]
name = "mlir"
description = "Faster and simpler MLIR infrastructure, built on Core C"
platforms = ["osx-arm64", "linux-64", "win-64"]
version = "0.1.0"

#=============================================================================
# Tokenizer (re2c) — available in all environments via the default feature
#=============================================================================
[tasks]
tokenizer = { cmd = "re2c --no-generation-date -b tokenizer.re -o tokenizer.c", inputs = ["tokenizer.re"], outputs = ["tokenizer.c"], description = "Generate tokenizer.c from tokenizer.re via re2c" }

[dependencies]
shell = "*"
re2c = ">=3"
python = ">=3.11"
toml = ">=0.10.2"

#=============================================================================
# Common MLIR sources (used by every native/wasm build below)
#=============================================================================
# Reusable shell-variable list of mlir + corec + corec-stdlib sources.
# Defined inline in each platform task because pixi tasks don't share env.

#=============================================================================
# WebAssembly (WASI)
#=============================================================================
[feature.wasm.tasks]
build_wasm = { cmd = """
clang \
    --target=wasm32-wasi \
    -Os \
    -nostdlib \
    -nostdinc \
    -fno-builtin \
    -I corec \
    -I corec-stdlib/stdlib \
    -I . \
    -Wl,--no-entry \
    -Wl,--export=__heap_base \
    -Wl,--export=_start \
    -Wl,--initial-memory=131072 \
    -o parser.wasm \
    parser.c \
    tokenizer.c \
    mlir_parser.c \
    mlir_classic_printer.c \
    mlir_generic_printer.c \
    op_parsers.c \
    mlir_api_impl.c \
    mlir_op_names.c \
    corec-stdlib/stdlib/stdio.c \
    corec-stdlib/stdlib/stdlib.c \
    corec-stdlib/stdlib/printf.c \
    corec-stdlib/stdlib/string_impl.c \
    corec/base/io.c \
    corec/base/buddy.c \
    corec/base/arena.c \
    corec/base/scratch.c \
    corec/base/format.c \
    corec/base/math.c \
    corec/base/string.c \
    corec/base/mem.c \
    corec/base/numconv.c \
    corec/base/assert.c \
    corec/base/exit.c \
    corec/platform/platform_wasm.c
""", inputs = [
    "parser.c", "tokenizer.c", "tokenizer.h",
    "mlir_parser.c", "mlir_parser.h",
    "mlir_classic_printer.c", "mlir_classic_printer.h",
    "mlir_generic_printer.c", "mlir_generic_printer.h",
    "op_parsers.c", "op_parsers.h",
    "mlir_api_impl.c", "mlir_op_names.c", "mlir_op_names.h", "mlir_api.h",
    "corec-stdlib/stdlib/**/*.c", "corec-stdlib/stdlib/**/*.h",
    "corec/base/**/*.c", "corec/base/**/*.h",
    "corec/platform/platform_wasm.c", "corec/platform/platform.h",
], outputs = ["parser.wasm"], depends-on = ["tokenizer"], description = "Build parser.wasm (wasm32-wasi target)" }

test_wasm = { cmd = "wasmtime --dir . parser.wasm --construct", depends-on = ["build_wasm"], description = "Run parser.wasm under wasmtime (construct mode)" }

[feature.wasm.dependencies]
clang = ">=20.1.4,<21"
lld = ">=20.1.4,<21"
wasmtime = ">=38.0.3,<39"

#=============================================================================
# Linux
#=============================================================================
[feature.linux.tasks]
build_linux = { cmd = """
clang \
    -nostdlib \
    -nostdinc \
    -fno-builtin \
    -I corec \
    -I corec-stdlib/stdlib \
    -I . \
    -o parser \
    parser.c \
    tokenizer.c \
    mlir_parser.c \
    mlir_classic_printer.c \
    mlir_generic_printer.c \
    op_parsers.c \
    mlir_api_impl.c \
    mlir_op_names.c \
    mlir_lift_cf_to_scf.c \
    corec-stdlib/stdlib/stdio.c \
    corec-stdlib/stdlib/stdlib.c \
    corec-stdlib/stdlib/printf.c \
    corec-stdlib/stdlib/string_impl.c \
    corec/base/io.c \
    corec/base/buddy.c \
    corec/base/arena.c \
    corec/base/scratch.c \
    corec/base/format.c \
    corec/base/math.c \
    corec/base/string.c \
    corec/base/mem.c \
    corec/base/numconv.c \
    corec/base/assert.c \
    corec/base/exit.c \
    corec/platform/platform_linux.c
""", depends-on = ["tokenizer"], description = "Build mlir native binary (Linux only)" }

test_linux = { cmd = "./parser --construct && python run_tests.py -s --native", depends-on = ["build_linux"], description = "Run mlir test suite (Linux)" }

build_linux_tinyc = { cmd = "bash scripts/build_linux_tinyc.sh", depends-on = ["tokenizer", { task = "build_tinyc_upstream", environment = "upstream" }], description = "Build mlir native binary using tinyC instead of clang's C frontend (Linux only)" }
test_linux_tinyc = { cmd = "MLIR_PARSER_NATIVE=$PWD/parser_tinyc python run_tests.py -s --native", depends-on = ["build_linux_tinyc"], description = "Run mlir test suite using the tinyC-built parser (Linux)" }

[feature.linux.target.linux-64.dependencies]
clang = ">=20.1.4,<21"

#=============================================================================
# macOS
#=============================================================================
[feature.macos.tasks]
build_macos = { cmd = """
clang \
    -g \
    -nostdlib \
    -nostdinc \
    -fno-builtin \
    -I corec \
    -I corec-stdlib/stdlib \
    -I . \
    -o parser \
    parser.c \
    tokenizer.c \
    mlir_parser.c \
    mlir_classic_printer.c \
    mlir_generic_printer.c \
    op_parsers.c \
    mlir_api_impl.c \
    mlir_op_names.c \
    mlir_lift_cf_to_scf.c \
    corec-stdlib/stdlib/stdio.c \
    corec-stdlib/stdlib/stdlib.c \
    corec-stdlib/stdlib/printf.c \
    corec-stdlib/stdlib/string_impl.c \
    corec/base/io.c \
    corec/base/buddy.c \
    corec/base/arena.c \
    corec/base/scratch.c \
    corec/base/format.c \
    corec/base/math.c \
    corec/base/string.c \
    corec/base/mem.c \
    corec/base/numconv.c \
    corec/base/assert.c \
    corec/base/exit.c \
    corec/platform/platform_macos.c \
    -lSystem \
    -Wl,-e,__start
""", depends-on = ["tokenizer"], description = "Build mlir native binary (macOS only)" }

test_macos = { cmd = "./parser --construct && python run_tests.py -s --native", depends-on = ["build_macos"], description = "Run mlir test suite (macOS)" }

build_macos_tinyc = { cmd = "bash scripts/build_macos_tinyc.sh", depends-on = ["tokenizer", { task = "build_tinyc_upstream", environment = "upstream" }], description = "Build mlir native binary using tinyC instead of clang's C frontend (macOS only)" }
test_macos_tinyc = { cmd = "MLIR_PARSER_NATIVE=$PWD/parser_tinyc python run_tests.py -s --native", depends-on = ["build_macos_tinyc"], description = "Run mlir test suite using the tinyC-built parser (macOS)" }

build_cross_native_macos = { cmd = """
clang \
    -g \
    -nostdlib \
    -nostdinc \
    -fno-builtin \
    -I corec \
    -I corec-stdlib/stdlib \
    -I . \
    -o cross_native \
    tests/cross/driver.c \
    mlir_generic_printer.c \
    mlir_api_impl.c \
    mlir_op_names.c \
    mlir_lift_cf_to_scf.c \
    corec-stdlib/stdlib/stdio.c \
    corec-stdlib/stdlib/stdlib.c \
    corec-stdlib/stdlib/printf.c \
    corec-stdlib/stdlib/string_impl.c \
    corec/base/io.c \
    corec/base/buddy.c \
    corec/base/arena.c \
    corec/base/scratch.c \
    corec/base/format.c \
    corec/base/math.c \
    corec/base/string.c \
    corec/base/mem.c \
    corec/base/numconv.c \
    corec/base/assert.c \
    corec/base/exit.c \
    corec/platform/platform_macos.c \
    -lSystem \
    -Wl,-e,__start
""", description = "Build cross-impl test driver (native, macOS)" }

test_cross_native_macos = { cmd = "./cross_native > tests/cross/out_native.txt && diff tests/cross/expected.txt tests/cross/out_native.txt", depends-on = ["build_cross_native_macos"], description = "Run native cross-impl test driver and diff against reference" }

#=============================================================================
# Windows (MSVC)
#=============================================================================
[feature.windows.tasks]
build_windows = { cmd = """
cl \
    /nologo \
    /X \
    /std:c11 \
    /Zc:preprocessor \
    /I"corec" \
    /I"corec-stdlib/stdlib" \
    /I"." \
    /GS- \
    /Gs0 \
    /kernel \
    /c \
    parser.c \
    tokenizer.c \
    mlir_parser.c \
    mlir_classic_printer.c \
    mlir_generic_printer.c \
    op_parsers.c \
    mlir_api_impl.c \
    mlir_op_names.c \
    mlir_lift_cf_to_scf.c \
    corec-stdlib/stdlib/stdio.c \
    corec-stdlib/stdlib/stdlib.c \
    corec-stdlib/stdlib/printf.c \
    corec-stdlib/stdlib/string_impl.c \
    corec/base/io.c \
    corec/base/buddy.c \
    corec/base/arena.c \
    corec/base/scratch.c \
    corec/base/format.c \
    corec/base/math.c \
    corec/base/string.c \
    corec/base/mem.c \
    corec/base/numconv.c \
    corec/base/assert.c \
    corec/base/exit.c \
    corec/platform/platform_windows.c \
    && \
link \
    /nologo \
    /subsystem:console \
    /nodefaultlib \
    /entry:_start \
    /STACK:8388608,8388608 \
    kernel32.lib \
    shell32.lib \
    parser.obj \
    tokenizer.obj \
    mlir_parser.obj \
    mlir_classic_printer.obj \
    mlir_generic_printer.obj \
    op_parsers.obj \
    mlir_api_impl.obj \
    mlir_op_names.obj \
    mlir_lift_cf_to_scf.obj \
    stdio.obj \
    stdlib.obj \
    printf.obj \
    string_impl.obj \
    io.obj \
    buddy.obj \
    arena.obj \
    scratch.obj \
    format.obj \
    math.obj \
    string.obj \
    mem.obj \
    numconv.obj \
    assert.obj \
    exit.obj \
    platform_windows.obj \
    /out:parser.exe
""", depends-on = ["tokenizer"], description = "Build parser.exe native binary (Windows only; requires MSVC vcvars64)" }

test_windows = { cmd = "./parser.exe --construct && python run_tests.py -s --native", depends-on = ["build_windows"], description = "Run mlir test suite (Windows)" }

[feature.windows.target.win-64.dependencies]
# MSVC must be available on PATH (e.g. via vcvars64.bat)


#=============================================================================
# Upstream MLIR bridge
# Optional environment that links the public C API against upstream LLVM/MLIR
# (mlir_api_impl_upstream.cpp). Uses conda-forge `llvmdev`, which ships MLIR
# headers + libs. Restricted to native desktop platforms (no WASM) and isolated
# in its own pixi environment so the default/macos/linux/windows/wasm envs
# stay small and fast.
#=============================================================================
[feature.upstream]
platforms = ["linux-64", "osx-arm64", "win-64"]

[feature.upstream.dependencies]
mlir = "19.*"
zlib = "*"
zstd = "*"
# wasm-ld (from lld) and wasmtime are needed by `test_tinyc_upstream_wasm`,
# which links the wasm32 object emitted by `MLIR_TranslateModuleToWasm`
# and runs it under wasmtime.
lld = ">=22.1.4,<23"
wasmtime = ">=38.0.3,<39"

# C++ toolchain: use conda's cxx-compiler on Unix; on Windows use MSVC from the
# host (vcvars64) — conda's cxx-compiler on win-64 isn't compatible with the
# MSVC-built MLIR static libs.
[feature.upstream.target.unix.dependencies]
cxx-compiler = "*"
libxml2 = "*"

[feature.upstream.target.osx-arm64.activation.env]
PLATFORM_C = "corec/platform/platform_macos.c"
PLATFORM_OBJ = "platform_macos.o"

[feature.upstream.target.linux-64.activation.env]
PLATFORM_C = "corec/platform/platform_linux.c"
PLATFORM_OBJ = "platform_linux.o"

[feature.upstream.target.unix.tasks]
build_cross_upstream = { cmd = "bash tests/build_cross_upstream.sh", description = "Build cross-impl driver against upstream LLVM/MLIR" }
test_cross = { cmd = "./cross_upstream > tests/cross/out_upstream.txt && diff tests/cross/expected.txt tests/cross/out_upstream.txt", depends-on = ["build_cross_upstream"], description = "Run upstream cross-impl driver and diff against reference" }
build_parser_upstream = { cmd = "bash tests/build_parser_upstream.sh", depends-on = ["tokenizer"], description = "Build parser_upstream against upstream LLVM/MLIR" }
test_parser_upstream = { cmd = "bash tests/run_parser_upstream.sh", depends-on = ["build_parser_upstream"], description = "Run mlir test suite using parser_upstream as ./parser (some mismatches expected)" }
validate_refs = { cmd = "python run_tests.py --validate-refs", depends-on = ["build_parser_upstream"], description = "Round-trip every classic-form reference through the upstream parser to catch invalid MLIR" }
build_tinyc_upstream = { cmd = "bash examples/tinyc/build_tinyc_upstream.sh", description = "Build the tinyC example compiler against upstream LLVM/MLIR" }
test_tinyc_upstream = { cmd = "python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_upstream"], description = "Run tinyC example compiler tests" }
test_tinyc_upstream_wasm = { cmd = "TINYC_TARGET=wasm python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_upstream"], description = "Run tinyC example compiler tests against a wasm32 backend (wasm-ld + wasmtime)" }
build_tinyc_native = { cmd = "bash examples/tinyc/build_tinyc_native.sh", description = "Build the tinyC example compiler against the native MLIR backend (mlir_api_impl.c)" }
test_tinyc_native = { cmd = "TINYC=./tinyc_native python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_native"], description = "Run tinyC example compiler tests against the native-backend binary" }
test_tinyc_native_wasm = { cmd = "TINYC=./tinyc_native TINYC_TARGET=wasm TINYC_LOWERING=native python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_native"], description = "Run tinyC example compiler tests against the native backend with the native LLVM->wasm pipeline (wasm-ld + wasmtime)" }

[feature.upstream.target.win-64.tasks]
build_cross_upstream = { cmd = "tests\\build_cross_upstream.bat", description = "Build cross-impl driver against upstream LLVM/MLIR (Windows)" }
test_cross = { cmd = "./cross_upstream.exe > tests/cross/out_upstream.txt && python tests/file_diff.py tests/cross/expected.txt tests/cross/out_upstream.txt", depends-on = ["build_cross_upstream"], description = "Run upstream cross-impl driver and diff against reference (Windows)" }
build_parser_upstream = { cmd = "tests\\build_parser_upstream.bat", depends-on = ["tokenizer"], description = "Build parser_upstream against upstream LLVM/MLIR (Windows)" }
validate_refs = { cmd = "python run_tests.py --validate-refs", depends-on = ["build_parser_upstream"], description = "Round-trip every classic-form reference through the upstream parser to catch invalid MLIR (Windows)" }
build_tinyc_upstream = { cmd = "examples\\tinyc\\build_tinyc_upstream.bat", description = "Build the tinyC example compiler against upstream LLVM/MLIR (Windows)" }
test_tinyc_upstream = { cmd = "python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_upstream"], description = "Run tinyC example compiler tests (Windows)" }
test_tinyc_upstream_wasm = { cmd = "set TINYC_TARGET=wasm && python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_upstream"], description = "Run tinyC example compiler tests against a wasm32 backend (Windows)" }
build_tinyc_native = { cmd = "examples\\tinyc\\build_tinyc_native.bat", description = "Build the tinyC example compiler against the native MLIR backend (mlir_api_impl.c) (Windows)" }
test_tinyc_native = { cmd = "TINYC=./tinyc_native.exe python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_native"], description = "Run tinyC example compiler tests against the native-backend binary (Windows)" }
test_tinyc_native_wasm = { cmd = "set TINYC=./tinyc_native.exe&& set TINYC_TARGET=wasm&& set TINYC_LOWERING=native&& python examples/tinyc/run_tinyc_tests.py", depends-on = ["build_tinyc_native"], description = "Run tinyC example compiler tests against the native backend with the native LLVM->wasm pipeline (Windows)" }


[environments]
default = { solve-group = "default" }
wasm = ["wasm"]
linux = { features = ["linux"], solve-group = "linux" }
macos = { features = ["macos"], solve-group = "macos" }
windows = { features = ["windows"], solve-group = "windows" }
upstream = { features = ["upstream"], solve-group = "upstream" }
